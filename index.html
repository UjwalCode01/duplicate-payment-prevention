<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111827;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #1f2937;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2, h3 {
            color: #60a5fa;
            text-align: center;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }
        input {
            width: 93%;
            padding: 10px;
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 4px;
            color: white;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #responseMessage {
            margin-top: 16px;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .success-msg {
            background-color: #064e3b;
            color: #a7f3d0;
            display: block !important;
        }
        .error-msg {
            background-color: #7f1d1d;
            color: #fca5a5;
            display: block !important;
        }
        .history-container {
            width: 100%;
            max-width: 650px;
            background-color: #1f2937;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-top: 32px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 12px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #374151;
        }
        th {
            background-color: #374151;
            color: #f3f4f6;
        }
        .status-badge {
            background-color: #064e3b;
            color: #a7f3d0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Process Payment</h2>
        <form id="paymentForm">
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="userId" required>
            </div>
            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" id="amount" required>
            </div>
            <div class="form-group">
                <label>Vendor ID</label>
                <input type="text" id="vendorId" required>
            </div>
            <button type="submit">Submit Payment</button>
        </form>
        <div id="responseMessage"></div>
    </div>

    <div class="history-container">
        <h3>Transaction History</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>User ID</th>
                    <th>Vendor ID</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
        </table>
    </div>

    <script>
        // Directly using the backend server IP to avoid origin conflicts
        const API_URL = "http://127.0.0.1:8000";

        async function fetchTransactions() {
            try {
                const response = await fetch(API_URL + "/transactions");
                if (!response.ok) return;
                const data = await response.json();
                const tbody = document.getElementById("transactionTableBody");
                tbody.innerHTML = "";
                
                data.reverse().forEach(tx => {
                    const row = document.createElement("tr");
                    const timeFormatted = new Date(tx.timestamp).toLocaleTimeString();

                    row.innerHTML = `
                        <td>${timeFormatted}</td>
                        <td>${tx.user_id}</td>
                        <td>${tx.vendor_id}</td>
                        <td>$${tx.amount}</td>
                        <td><span class="status-badge">${tx.status}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error("Error fetching transactions:", err);
            }
        }

        document.getElementById("paymentForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            console.log("Form submit button clicked!"); // Check if this shows in console
            
            const msgBox = document.getElementById("responseMessage");
            const payload = {
                user_id: document.getElementById("userId").value,
                amount: parseFloat(document.getElementById("amount").value),
                vendor_id: document.getElementById("vendorId").value
            };

            try {
                const response = await fetch(API_URL + "/process-payment", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                msgBox.className = ""; 

                if (response.ok) {
                    msgBox.textContent = result.message;
                    msgBox.classList.add("success-msg");
                    fetchTransactions();
                } else {
                    msgBox.textContent = result.detail;
                    msgBox.classList.add("error-msg");
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                msgBox.textContent = "Server Connection Error!";
                msgBox.className = "";
                msgBox.classList.add("error-msg");
            }
        });

        // Initial call
        fetchTransactions();
    </script>
</body>
</html>
